<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join WhatsApp Group</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f0f2f5;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 400px;
        }

        .whatsapp-icon {
            font-size: 50px;
            color: #25D366;
            margin-bottom: 20px;
        }

        h2 { color: #333; margin-bottom: 10px; font-weight: 600; }
        p { color: #666; margin-bottom: 30px; font-size: 0.9rem; }

        .join-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: #25D366;
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px; /* Square corners */
            transition: background 0.3s ease;
            white-space: nowrap; /* Button content ek line madhe rahnyasathi */
        }

        .join-btn i { margin-right: 8px; font-size: 18px; }

        .join-btn:hover { background-color: #128C7E; }
    </style>
</head>
<body>

    <div class="card">
        <div class="whatsapp-icon"><i class="fab fa-whatsapp"></i></div>
        <h2>Join Our Group</h2>
        <p>Click below to join our official WhatsApp group.</p>
        
        <a href="https://chat.whatsapp.com/K8Gew5F1nPfJv2NDPEbxwc" class="join-btn" target="_blank">
            <i class="fab fa-whatsapp"></i> Join WhatsApp Group
        </a>
    </div>

</body>
</html>
