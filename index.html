<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Our WhatsApp Channel</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome for WhatsApp Icon -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #128c7e 0%, #075e54 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 90%;
            max-width: 450px;
        }
        h1 { font-size: 24px; margin-bottom: 15px; }
        p { font-size: 16px; margin-bottom: 30px; opacity: 0.9; }
        
        .join-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background-color: #25D366;
            color: white;
            padding: 15px 30px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
        }
        .join-btn:hover {
            background-color: #128c7e;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
        }
        .footer-text { margin-top: 20px; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

    <div class="container">
        <i class="fab fa-whatsapp" style="font-size: 60px; margin-bottom: 20px; color: #25D366;"></i>
        <h1>Join Our Official Channel</h1>
        <p>Stay updated with the latest news, offers, and exclusive content directly on your WhatsApp.</p>
        
        <a href="https://chat.whatsapp.com/K8Gew5F1nPfJv2NDPEbxwc" target="_blank" class="join-btn">
            <i class="fab fa-whatsapp"></i> Join WhatsApp Channel
        </a>
        
        <p class="footer-text">Secure & Private • Official WhatsApp Link</p>
    </div>

</body>
</html>
